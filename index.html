<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalculatingIrregular Pro | Simpson's Rule Visualizer</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root { --primary: #0078d4; --bg: #f4f4f4; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); padding: 25px; width: 100%; max-width: 900px; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0 0 15px 0; font-size: 22px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 13px; color: #555; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #005a9e; }
        #plot { width: 100%; height: 500px; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        .result-badge { background: #e1f5fe; color: #01579b; padding: 15px; border-radius: 8px; text-align: center; margin-top: 20px; font-size: 18px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>CalculatingIrregular: Simpson's Rule & 3D Visualization</h1>
    
    <div class="input-grid">
        <div>
            <label>Outer Radii ($R$):</label>
            <input type="text" id="outerR" value="5, 8, 10, 8, 5" placeholder="e.g. 5, 8, 10">
        </div>
        <div>
            <label>Inner Radii ($r$):</label>
            <input type="text" id="innerR" value="0, 0, 0, 0, 0" placeholder="0 for solid">
        </div>
        <div>
            <label>Interval [$a, b$]:</label>
            <input type="text" id="interval" value="0, 10" placeholder="start, end">
        </div>
        <div>
            <label>Rotation Angle ($\theta^\circ$):</label>
            <input type="number" id="theta" value="360" max="360" min="1">
        </div>
    </div>

    <button onclick="calculateAndPlot()">Calculate & Generate 3D Model</button>

    <div id="result-badge" class="result-badge"></div>
    <div id="plot"></div>
</div>

<script>
    function calculateAndPlot() {
        // 1. Data Parsing
        const outer = document.getElementById('outerR').value.split(',').map(Number);
        const inner = document.getElementById('innerR').value.split(',').map(Number);
        const [a, b] = document.getElementById('interval').value.split(',').map(Number);
        const thetaDeg = parseFloat(document.getElementById('theta').value);
        
        if (outer.length % 2 === 0) {
            alert("Simpson's Rule requires an odd number of data points (even number of intervals).");
            return;
        }

        const n = outer.length - 1;
        const h = (b - a) / n;
        const thetaRad = (thetaDeg * Math.PI) / 180;

        // 2. Simpson's Rule Integration
        // Volume = (theta / 2) * Integral[R(x)^2 - r(x)^2] dx
        let sum = 0;
        const f = (i) => Math.pow(outer[i], 2) - Math.pow(inner[i], 2);

        for (let i = 0; i <= n; i++) {
            let weight = (i === 0 || i === n) ? 1 : (i % 2 === 1 ? 4 : 2);
            sum += weight * f(i);
        }
        const volume = (thetaRad / 2) * (h / 3) * sum;

        // 3. Display Result
        const badge = document.getElementById('result-badge');
        badge.style.display = 'block';
        badge.innerHTML = `Estimated Volume: ${volume.toFixed(4)} units³`;

        // 4. Plotly 3D Visualization
        const xRange = Array.from({length: outer.length}, (_, i) => a + i * h);
        const thetaSteps = 40;
        const phiRange = Array.from({length: thetaSteps}, (_, i) => (i / (thetaSteps - 1)) * thetaRad);

        let data = [];

        // Generate Outer Surface
        let xArr = [], yArr = [], zArr = [];
        for (let i = 0; i < xRange.length; i++) {
            let rowX = [], rowY = [], rowZ = [];
            for (let j = 0; j < phiRange.length; j++) {
                rowX.push(xRange[i]);
                rowY.push(outer[i] * Math.cos(phiRange[j]));
                rowZ.push(outer[i] * Math.sin(phiRange[j]));
            }
            xArr.push(rowX); yArr.push(rowY); zArr.push(rowZ);
        }

        data.push({
            type: 'surface',
            x: xArr, y: yArr, z: zArr,
            colorscale: 'Blues',
            showscale: false,
            opacity: 0.8,
            name: 'Outer Surface'
        });

        // Layout
        const layout = {
            title: '3D Solid of Revolution',
            scene: {
                xaxis: {title: 'X (Axis of Rotation)'},
                yaxis: {title: 'Y'},
                zaxis: {title: 'Z'}
            },
            margin: {l:0, r:0, b:0, t:40}
        };

        Plotly.newPlot('plot', data, layout);
    }
</script>

</body>
</html>
