<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalculatingIrregular Pro | Ratio & Irregular Scaling</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --primary: #0078d4; --bg: #f4f4f4; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); padding: 25px; width: 100%; max-width: 900px; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0 0 15px 0; font-size: 22px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 13px; color: #555; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .full-width { grid-column: span 2; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #005a9e; }
        #plot { width: 100%; height: 500px; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        .result-badge { background: #e1f5fe; color: #01579b; padding: 15px; border-radius: 8px; text-align: center; margin-top: 20px; font-size: 18px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>CalculatingIrregular: Ratio & Irregular Scaling</h1>
    
    <div class="input-grid">
        <div class="full-width">
            <label>Function R(x) (Calculates Irregular Profiles):</label>
            <input type="text" id="funcR" value="sqrt(x)" placeholder="e.g. x^2, sin(x)">
        </div>
        <div>
            <label>Interval [a, b]:</label>
            <input type="text" id="interval" value="0, 4">
        </div>
        <div>
            <label>Scale Ratio (e.g., 1.5):</label>
            <input type="number" id="ratio" value="1.0" step="0.1">
        </div>
        <div>
            <label>Rotation Angle (θ°):</label>
            <input type="number" id="theta" value="360" max="360">
        </div>
        <div>
            <label>Samples (Odd Number):</label>
            <input type="number" id="samples" value="21" step="2">
        </div>
    </div>

    <button onclick="calculateAndPlot()">Calculate Scaled Volume</button>

    <div id="result-badge" class="result-badge"></div>
    <div id="plot"></div>
</div>

<script>
    function calculateAndPlot() {
        const funcStr = document.getElementById('funcR').value;
        const [a, b] = document.getElementById('interval').value.split(',').map(Number);
        const ratio = parseFloat(document.getElementById('ratio').value);
        const thetaDeg = parseFloat(document.getElementById('theta').value);
        const nPoints = parseInt(document.getElementById('samples').value);

        try {
            const h = (b - a) / (nPoints - 1);
            const thetaRad = (thetaDeg * Math.PI) / 180;
            const compiledR = math.compile(funcStr);

            let xRange = [], outerRadii = [];

            for (let i = 0; i < nPoints; i++) {
                let x = a + i * h;
                xRange.push(x);
                // Apply the Ratio to the radii for irregular scaling
                outerRadii.push(compiledR.evaluate({x: x}) * ratio);
            }

            // Simpson's Rule
            let sum = 0;
            for (let i = 0; i < nPoints; i++) {
                let weight = (i === 0 || i === nPoints - 1) ? 1 : (i % 2 === 1 ? 4 : 2);
                sum += weight * Math.pow(outerRadii[i], 2);
            }
            const volume = (thetaRad / 2) * (h / 3) * sum;

            const badge = document.getElementById('result-badge');
            badge.style.display = 'block';
            badge.innerHTML = `Scaled Volume: ${volume.toFixed(4)} units³`;

            // 3D Visualization
            const thetaSteps = 50;
            const phiRange = Array.from({length: thetaSteps}, (_, i) => (i / (thetaSteps - 1)) * thetaRad);
            let xS = [], yS = [], zS = [];
            for (let i = 0; i < xRange.length; i++) {
                let rX = [], rY = [], rZ = [];
                for (let j = 0; j < phiRange.length; j++) {
                    rX.push(xRange[i]);
                    rY.push(outerRadii[i] * Math.cos(phiRange[j]));
                    rZ.push(outerRadii[i] * Math.sin(phiRange[j]));
                }
                xS.push(rX); yS.push(rY); zS.push(rZ);
            }

            Plotly.newPlot('plot', [{ type: 'surface', x: xS, y: yS, z: zS, colorscale: 'Viridis', showscale: false }], {
                scene: { xaxis: {title: 'X'}, yaxis: {title: 'Y'}, zaxis: {title: 'Z'} },
                margin: {l:0, r:0, b:0, t:40}
            });

        } catch (err) {
            alert("Check your math syntax or interval.");
        }
    }
</script>
</body>
</html>
